version: "3.8"

services:
  api:
    image: python:3.10
    container_name: store-intelligence-api
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "pip install fastapi uvicorn &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"